
<!DOCTYPE html>
<html>
<head>
<title>Panel Admin</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<h1>Panel Administration</h1>
<div id="panel"></div>

<script>
let role=localStorage.getItem("role")
let panel=document.getElementById("panel")

if(role=="fondateur"){
panel.innerHTML=`<h2>👑 Accès Fondateur</h2>`
}

if(role=="cofondateur"){
panel.innerHTML=`<h2>🛡 Accès Co‑Fondateur</h2>`
}

if(role=="dev"){
panel.innerHTML=`<h2>💻 Accès Développeur</h2>`
}
</script>

</body>
</html>
